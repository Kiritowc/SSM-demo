version: "3.8"

services:
  vlm-server:
    image: edgebase:v1
    working_dir: /app
    volumes:
      - ..:/app
    environment:
      - SSM_ROOT=/app
    command: bash services/vlm-server/scripts/start.sh
    network_mode: host

  video:
    image: edgebase:v1
    working_dir: /app
    volumes:
      - ..:/app
    environment:
      - SSM_ROOT=/app
    command: python services/video/server.py
    network_mode: host
