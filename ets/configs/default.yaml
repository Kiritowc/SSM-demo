# 训练超参、模型名、窗口、seed/device 等默认值：scripts/train.py → parse_args()
# 数据集路径与特征列：configs/data/<data.profile>.yaml
# 模型结构超参：configs/models/<model.name>.yaml

task:
  type: forecast

model: {}

data:
  profile: air_quality
  stride: 1
  input_mode: features_only
  target_channel: -1

train:
  epochs: 100
  batch_size: 32
  lr: 0.001
  log_dir: ets/artifacts/runs
  pin_memory: true
  scheduler_params:
    step_size: 10
    gamma: 0.5
    T_max: 100
  visualization:
    enabled: true
    save_dir: plots
    dpi: 150
    plot_predictions: true
    max_prediction_samples: 500

eval:
  mode: holdout
  n_splits: 5
  train_window: null
  fold_epochs: 5
