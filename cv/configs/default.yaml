model_name: ssg_a
obj_labels: [robot_toy]
runs_dir: cv/artifacts/runs
save_dir: cv/artifacts/runs/robot_toy
zerostart: false
pretrained_weight: cv/artifacts/runs/robot_toy/best.bin
dataset:
  train: cv/data/robot_toy/train.txt
  val: cv/data/robot_toy/val.txt
  names: cv/data/robot_toy/classes.txt
model:
  nc: 1
  input_width: 416
  input_height: 416
train:
  lr: 0.001
  thresh: 0.25
  warmup: true
  batch_size: 16
  end_epoch: 100
  milestones: [70, 85, 95]
deploy:
  engine: cv/artifacts/engines/robot_toy.engine
  onnx: cv/artifacts/engines/robot_toy.onnx
  marker: cv/artifacts/engines/.robot_toy_ready
